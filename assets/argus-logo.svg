<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22C55E"/>
      <stop offset="100%" style="stop-color:#4ADE80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0A0A0A"/>

  <!-- Main text: ARGUS -->
  <text x="640" y="295" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="120" font-weight="700" letter-spacing="18" fill="#FFFFFF">
    ARGUS
  </text>

  <!-- Green accent line -->
  <rect x="440" y="330" width="400" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Tagline -->
  <text x="640" y="380" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" letter-spacing="6" fill="#6B7280">
    AI-POWERED QA TESTING
  </text>

  <!-- Minimal eye dot -->
  <circle cx="672" cy="268" r="5" fill="#22C55E"/>
</svg>
