# Argus Agent Hooks
# Automated behaviors that trigger on specific events during the agent session.
# Users can override per project in .argus/config.yaml under the 'hooks' key.

on-session-start:
  description: "Auto-load Argus when project has .argus/ directory"
  trigger: ".argus/ directory exists in project root"
  enabled: true
  actions:
    - load-skill: using-argus
    - display: |
        Argus loaded for project: {config.project.name}
        Stack: {config.stack.language} + {config.stack.web}
        Features: {count .argus/features/*.feature.md}
        Test cases: {count .argus/test-cases/*.testcase.md}
        Flows: {count .argus/flows/*.flow.yaml}
        Suites: {count .argus/suites/*.suite.yaml}
        Bug reports: {count .argus/reports/bugs/*.report.md}
        Discovery reports: {count .argus/reports/discovery/*.report.md}
        UI verifications: {count .argus/reports/ui-verification/*.ui-verification.md}
        Accessibility reports: {count .argus/reports/accessibility/*.accessibility.md}
        Maintenance reports: {count .argus/reports/maintenance/*.maintenance.md}
        Spec analyses: {count .argus/reports/analysis/*.analysis.md}
        Specs folders: {count .argus/specs/*/}

on-before-skill:
  description: "Validate config before any Argus skill runs"
  trigger: "Any Argus skill is about to run"
  enabled: true
  actions:
    - check: ".argus/config.yaml exists"
      on-fail: "No Argus config found. Run 'Set up Argus for this project' first."
    - check: "Required config fields are present for the specific skill"
      on-fail: "List missing fields, ask user to configure"

on-stale-check:
  description: "Warn if upstream artifacts are newer than downstream"
  trigger: "test-case-creator, page-object-generator, flow-composer, test-data-generator, or suite-composer is about to run"
  enabled: true
  checks:
    - skill: test-case-creator
      upstream: ".argus/features/{id}.feature.md"
      downstream: ".argus/test-cases/{id}.testcase.md"
    - skill: page-object-generator
      upstream:
        - ".argus/features/{id}.feature.md"
        - ".argus/test-cases/{id}.testcase.md"
      downstream: ".argus/automation/*/pages/{id}.*"
    - skill: flow-composer
      upstream: ".argus/features/*.feature.md"
      downstream: ".argus/flows/{flow-name}.flow.yaml"
    - skill: test-data-generator
      upstream: ".argus/test-cases/{id}.testcase.md"
      downstream: ".argus/test-data/{id}.data.json"
    - skill: suite-composer
      upstream:
        - ".argus/test-cases/*.testcase.md"
        - ".argus/flows/*.flow.yaml"
      downstream: ".argus/suites/*.suite.yaml"
  on-stale: "Warn user: upstream was updated since downstream was generated. Suggest regenerating."

on-after-generate:
  description: "Validate output and show summary after artifact generation"
  trigger: "Any Argus skill produces an artifact"
  enabled: true
  actions:
    - validate-schema:
        feature: "schemas/feature.schema.md"
        testcase: "schemas/testcase.schema.md"
        flow: "schemas/flow.schema.md"
        testdata: "schemas/testdata.schema.md"
        suite: "schemas/suite.schema.md"
        bugreport: "schemas/bugreport.schema.md"
        report: "schemas/report.schema.md"
        discovery: "schemas/discovery.schema.md"
        ui-verification: "schemas/ui-verification.schema.md"
        accessibility: "schemas/accessibility.schema.md"
        maintenance: "schemas/maintenance.schema.md"
        analysis: "schemas/analysis.schema.md"
      on-fail: "List validation errors, fix before saving"
    - display-summary: true

on-feature-change:
  description: "List downstream artifacts that may need regeneration"
  trigger: "A .feature.md file in .argus/features/ is modified"
  enabled: true
  action: "List all downstream artifacts that reference this feature ID"

on-test-fail:
  description: "Suggest bug reporting after test failures"
  trigger: "test-runner reports failed test cases"
  enabled: true
  auto-suggest: true
  action: |
    List failed test cases with IDs.
    Offer options:
      A) Draft bug reports for all failures (invokes bug-reporter)
      B) Draft bug reports for critical failures only
      C) Skip — review manually

on-flow-gap:
  description: "Suggest filling missing features in flow chains"
  trigger: "flow-composer detects a missing feature in dependency chain"
  enabled: true
  action: |
    Show the gap in the chain.
    Offer options:
      A) Analyze the missing spec (invokes spec-analyzer)
      B) Skip the missing feature and connect directly
      C) Cancel the flow

on-after-test-run:
  description: "Suggest reporting after test execution completes"
  trigger: "test-runner finishes executing tests"
  enabled: true
  action: |
    Show pass/fail summary.
    Offer options:
      A) Generate a feature report (invokes report-generator)
      B) Generate a daily report (invokes report-generator)
      C) Draft bug reports for failures (invokes bug-reporter)
      D) Skip — review results manually

on-suite-run-stale:
  description: "Warn if suite references stale or missing artifacts"
  trigger: "test-runner is about to execute a suite"
  enabled: true
  checks:
    - "All features referenced in suite still exist in .argus/features/"
    - "All scenarios referenced in suite still exist in their feature files"
    - "Suite was generated after the latest test case changes"
  on-stale: "Warn user: suite may be outdated. Suggest re-composing before running."

on-after-exploration:
  description: "Suggest next steps after exploratory testing completes"
  trigger: "exploratory-tester finishes exploring an app"
  enabled: true
  action: |
    Show discovery summary (pages, elements, API calls).
    Offer options:
      A) Analyze a spec for this feature (invokes spec-analyzer)
      B) Generate a test plan based on findings (invokes test-planner)
      C) Explore another area of the app
      D) Done — review the report

on-after-verification:
  description: "Suggest bug reporting after verification finds issues"
  trigger: "ui-verifier or accessibility-checker completes with issues found"
  enabled: true
  action: |
    Show issue summary.
    Offer options:
      A) File bugs for the issues (invokes bug-reporter)
      B) Run the other verification skill (ui-verifier ↔ accessibility-checker)
      C) Done — review the report

on-maintenance-findings:
  description: "Present tester decision points after maintenance check"
  trigger: "test-maintainer completes with discrepancies found"
  enabled: true
  action: |
    For each spec vs app discrepancy, ask:
      A) Spec is correct → file a bug
      B) App is correct → update the spec
      C) There's a CR → provide the CR
    After decisions, offer:
      A) Update feature file and regenerate downstream artifacts
      B) File bugs for spec-is-correct items (invokes bug-reporter)
      C) Done — handle manually
